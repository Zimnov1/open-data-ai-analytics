name: CI Self-hosted

on:
  workflow_dispatch:

jobs:
  run-visualization-local:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Checkout repository
        uses: ./_actions/actions/checkout/v4

      - name: Use system Python
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib openpyxl xlrd

      - name: Run visualization module
        run: |
          mkdir artifacts\visualization
          python src\visualization.py > artifacts\visualization\run.log 2>&1 || exit 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization-selfhosted
          path: artifacts\visualization